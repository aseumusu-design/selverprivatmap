<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Login - A2 Store</title>
<link rel="icon" type="image/png" href="../assets/logo.png"/>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css"/>
<link rel="stylesheet" href="../css/chat.css"/>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-glow bg-glow-1"></div>
<div class="bg-glow bg-glow-2"></div>

<section class="admin-wrap">
  <div class="admin-card glass">
    <img src="../assets/logo.png" class="admin-logo" alt="A2"/>
    <h1>Masuk ke A2 Store</h1>
    <p class="muted">Login dengan akun Google untuk mulai belanja & chat admin</p>
    <button id="google-signin-btn" class="btn btn-primary btn-full">
      <svg width="18" height="18" viewBox="0 0 48 48" style="vertical-align:middle;margin-right:8px"><path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3c-1.6 4.7-6.1 8-11.3 8-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.9 6.2 29.7 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.2-.1-2.4-.4-3.5z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.7 15.1 19 12 24 12c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.9 6.2 29.7 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/><path fill="#4CAF50" d="M24 44c5.6 0 10.7-2.1 14.5-5.6l-6.7-5.5C29.7 34.4 27 35.5 24 35.5c-5.2 0-9.6-3.3-11.3-7.9l-6.6 5.1C9.5 39.5 16.2 44 24 44z"/><path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.3-2.3 4.2-4.2 5.5l6.7 5.5C42.7 35.6 44 30.1 44 24c0-1.2-.1-2.4-.4-3.5z"/></svg>
      <span class="btn-label">Masuk dengan Google</span>
    </button>
    <p id="login-error" class="error"></p>
    <p class="muted" style="margin-top:14px"><a href="/home.html" style="color:#00e5ff">← Kembali ke beranda</a></p>
  </div>
</section>

<script type="module" src="../js/login.js"></script>
</body>
</html>
